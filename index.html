// ═══════════════════════════════════════════════════════
//  Arrow overlay
// ═══════════════════════════════════════════════════════
function slotElement(zone, idx) {
  return document.querySelector(`.slot[data-zone="${zone}"][data-index="${idx}"]`);
}

function drawArrow(meta) {
  const path = document.getElementById('arrow-path');
  if (!meta) { path.setAttribute('stroke', 'transparent'); return; }

  const fromEl = slotElement(meta.fromZone, meta.fromIdx);
  const toEl   = slotElement(meta.toZone,   meta.toIdx);
  if (!fromEl || !toEl) { path.setAttribute('stroke', 'transparent'); return; }

  const fr = fromEl.getBoundingClientRect();
  const tr = toEl.getBoundingClientRect();
  const x1 = fr.left + fr.width  / 2;
  const y1 = fr.top  + fr.height * 0.78;
  const x2 = tr.left + tr.width  / 2;
  const y2 = tr.top  + tr.height * 0.78;

  // Curved path — control point offset perpendicular to the line
  const dx = x2 - x1, dy = y2 - y1;
  const len = Math.sqrt(dx*dx + dy*dy) || 1;
  const curve = Math.min(80, len * 0.45);
  const cx = (x1 + x2) / 2 - (dy / len) * curve;
  const cy = (y1 + y2) / 2 + (dx / len) * curve;

  const isSwap  = meta.fromZone === meta.toZone
                  ? meta.fromIdx !== meta.toIdx
                  : true;
  const color   = (meta.fromZone === meta.toZone && isSwap) ? '#c070f0'  // swap = purple
                : meta.toZone === 'temp'                    ? '#f0a030'  // into temp = amber
                :                                             '#50c878'; // into array/scratch = green

  // Update marker fill to match stroke colour via CSS custom property trick:
  // simplest approach — inline fill on the marker paths
  document.querySelectorAll('#arrow-overlay marker path').forEach(p => p.setAttribute('fill', color));

  path.setAttribute('d', `M${x1},${y1} Q${cx},${cy} ${x2},${y2}`);
  path.setAttribute('stroke', color);
}

function clearArrow() {
  document.getElementById('arrow-path').setAttribute('stroke', 'transparent');
  document.querySelectorAll('#arrow-overlay marker path').forEach(p => p.setAttribute('fill', 'transparent'));
}

// ═══════════════════════════════════════════════════════
//  Algorithm Analysis Engine
// ═══════════════════════════════════════════════════════

// Detects 3-step manual temp-swaps: array[p]→temp, array[q]→array[p], temp→array[q].
// Works regardless of action type (move or shift). Returns consumed action indices so
// scorers can exclude them from other signals (e.g. shift mode shouldn't disqualify bubble).
function detectManualSwaps(actions) {
  const result = [];
  const used   = new Set();

  for (let i = 0; i < actions.length; i++) {
    if (used.has(i) || !actions[i].meta) continue;

    // Find next two non-pass, non-used real actions
    let j = i + 1;
    while (j < actions.length && (actions[j].type === 'pass' || used.has(j) || !actions[j].meta)) j++;
    if (j >= actions.length) continue;

    let k = j + 1;
    while (k < actions.length && (actions[k].type === 'pass' || used.has(k) || !actions[k].meta)) k++;
    if (k >= actions.length) continue;

    const a1 = actions[i], a2 = actions[j], a3 = actions[k];

    if (a1.meta.fromZone !== 'array' || a1.meta.toZone !== 'temp')  continue;
    if (a2.meta.fromZone !== 'array' || a2.meta.toZone !== 'array') continue;
    if (a3.meta.fromZone !== 'temp'  || a3.meta.toZone !== 'array') continue;

    const p = a1.meta.fromIdx;  // value saved to temp came from here
    const q = a2.meta.fromIdx;  // value being shifted came from here

    if (a2.meta.toIdx !== p) continue;  // step 2 must land at p
    if (a3.meta.toIdx !== q) continue;  // step 3 must land at q (completing the swap)

    result.push({
      fromIdx: p,
      toIdx:   q,
      adjacent: Math.abs(p - q) === 1,
      actionIndices: [i, j, k],
    });
    used.add(i); used.add(j); used.add(k);
  }

  return result;
}

// Returns the real integer value stored in a snapshot position (unwraps ghosts and card objects).
function snapVal(snap, zone, idx) {
  let raw;
  if (zone === 'array')        raw = snap.array[idx];
  else if (zone === 'temp')    raw = snap.temp;
  else if (zone === 'scratch') raw = snap.scratch[idx];
  else return null;
  return cardNum(raw);
}

function scoreBubble(actions, n) {
  const real  = actions.filter(a => a.type !== 'pass');
  const notes = [];

  if (real.length === 0) return { score: 0, notes: ['No moves recorded'] };

  // Detect manual temp-swap triplets first so we don't penalise them
  const manualSwaps = detectManualSwaps(actions);
  const manualIds   = new Set(manualSwaps.flatMap(s => s.actionIndices));

  // Shifts NOT consumed by a manual-swap triplet are a real disqualifier
  const bareShifts = actions.filter((a, i) => a.type === 'shift' && !manualIds.has(i));
  if (bareShifts.length > 0) {
    return { score: 0, notes: [`✗ ${bareShifts.length} shift action(s) not part of a temp-swap — incompatible with bubble sort`] };
  }

  // Combine direct drag-swaps and manual temp-swaps into one pool
  const directSwaps = actions
    .map((a, i) => ({ a, i }))
    .filter(({ a }) => a.type === 'swap')
    .map(({ a }) => ({
      fromIdx:  a.meta.fromIdx,
      toIdx:    a.meta.toIdx,
      adjacent: a.meta.fromZone === 'array' && a.meta.toZone === 'array' &&
                Math.abs(a.meta.fromIdx - a.meta.toIdx) === 1,
    }));

  const allSwaps = [...directSwaps, ...manualSwaps];

  if (allSwaps.length === 0) {
    return { score: 0.05, notes: ['✗ No swap actions detected (direct or via temp)'] };
  }

  const adjSwaps = allSwaps.filter(s => s.adjacent);
  const ratio    = adjSwaps.length / allSwaps.length;

  let score = 0;
  if (ratio === 1) {
    score += 0.90;  // perfect adjacency is the definitive bubble sort signal
    const parts = [];
    if (directSwaps.length) parts.push(`${directSwaps.length} direct`);
    if (manualSwaps.length) parts.push(`${manualSwaps.length} via temp`);
    notes.push(`✓ All ${allSwaps.length} swap(s) adjacent (${parts.join(', ')})`);
  } else if (ratio >= 0.6) {
    score += ratio * 0.7;
    notes.push(`${adjSwaps.length}/${allSwaps.length} swaps adjacent (${Math.round(ratio*100)}%)`);
  } else {
    score += ratio * 0.4;
    notes.push(`✗ Only ${adjSwaps.length}/${allSwaps.length} swaps adjacent`);
  }

  const passes = actions.filter(a => a.type === 'pass');
  if (passes.length > 0) { score += 0.10; notes.push(`✓ ${passes.length} pass marker(s) annotated`); }

  const scratchUsed = real.some(a => a.meta && (a.meta.toZone === 'scratch' || a.meta.fromZone === 'scratch'));
  if (scratchUsed) { score -= 0.2; notes.push('✗ Scratch area used (unexpected for bubble sort)'); }
  if (manualSwaps.length > 0) notes.push(`ℹ ${manualSwaps.length} swap(s) implemented manually via temp variable`);

  return { score: Math.max(0, Math.min(1, score)), notes };
}

function scoreInsertion(actions, n) {
  const real  = actions.filter(a => a.type !== 'pass');
  const notes = [];

  if (real.length === 0) return { score: 0, notes: ['No moves recorded'] };

  const scratchUsed = real.some(a => a.meta && (a.meta.toZone === 'scratch' || a.meta.fromZone === 'scratch'));

  // Exclude shifts that are just manual swap triplets — those aren't insertion sort signals
  const manualSwaps = detectManualSwaps(actions);
  const manualIds   = new Set(manualSwaps.flatMap(s => s.actionIndices));
  const bareShifts  = actions.filter((a, i) => a.type === 'shift' && !manualIds.has(i));
  const allShifts   = actions.filter(a => a.type === 'shift');

  if (bareShifts.length === 0) {
    // No real insertion-sort shifts — check for adjacent-swap fallback
    const swaps = actions.filter(a => a.type === 'swap');
    const adjSwaps = swaps.filter(a =>
      a.meta.fromZone === 'array' && a.meta.toZone === 'array' &&
      Math.abs(a.meta.fromIdx - a.meta.toIdx) === 1
    );
    if (adjSwaps.length > 0 && adjSwaps.length === swaps.length && !scratchUsed) {
      notes.push('Adjacent swaps only — insertion sort possible but shift mode gives stronger evidence');
      return { score: 0.3, notes };
    }
    if (allShifts.length > 0) {
      notes.push('Shift actions present but all were part of manual swap patterns — not an insertion sort signal');
    } else {
      notes.push('✗ No shift actions — enable Shift mode when demonstrating insertion sort');
    }
    return { score: 0.05, notes };
  }

  let score = 0.5;
  notes.push(`✓ ${bareShifts.length} insertion-style shift action(s)`);

  const adjBareShifts = bareShifts.filter(a =>
    a.meta.fromZone === 'array' && a.meta.toZone === 'array' &&
    Math.abs(a.meta.fromIdx - a.meta.toIdx) === 1
  );
  if (adjBareShifts.length > 0) {
    score += 0.2;
    notes.push(`✓ ${adjBareShifts.length} adjacent array-to-array shift(s) (sliding elements to make room)`);
  }

  // Temp used for the "key" element being placed (move OR shift to temp — shift mode also valid)
  const extraTempMoves = actions.filter((a, i) =>
    !manualIds.has(i) && (a.type === 'move' || a.type === 'shift') &&
    a.meta && a.meta.toZone === 'temp'
  );
  if (extraTempMoves.length > 0) {
    score += 0.2;
    notes.push(`✓ Temp used ${extraTempMoves.length} time(s) to hold the element being inserted`);
  }

  if (scratchUsed) { score -= 0.2; notes.push('✗ Scratch used (unusual for insertion sort)'); }

  const passes = actions.filter(a => a.type === 'pass');
  if (passes.length > 0) { score += 0.1; notes.push(`✓ ${passes.length} pass marker(s) annotated`); }

  return { score: Math.max(0, Math.min(1, score)), notes };
}

function scoreSelection(actions, initial, n) {
  const real   = actions.filter(a => a.type !== 'pass');
  const swaps  = actions.filter(a => a.type === 'swap');
  const shifts = actions.filter(a => a.type === 'shift');
  const notes  = [];

  if (real.length === 0) return { score: 0, notes: ['No moves recorded'] };
  if (shifts.length > 0) return { score: 0, notes: ['✗ Shift actions present — incompatible with selection sort'] };

  const scratchUsed = real.some(a => a.meta && (a.meta.toZone === 'scratch' || a.meta.fromZone === 'scratch'));
  if (scratchUsed) return { score: 0.05, notes: ['✗ Scratch used — selection sort needs no auxiliary storage'] };

  // Count both direct swaps and manual temp-based swaps
  const manualSwaps = detectManualSwaps(actions);
  const manualIds   = new Set(manualSwaps.flatMap(s => s.actionIndices));
  const directSwaps = actions.filter(a => a.type === 'swap');
  const totalSwapCount = directSwaps.length + manualSwaps.length;

  if (totalSwapCount === 0) return { score: 0.05, notes: ['✗ No swaps recorded (direct or via temp)'] };

  let score = 0;

  if (totalSwapCount <= n - 1) {
    score += 0.65;
    const parts = [];
    if (directSwaps.length) parts.push(`${directSwaps.length} direct`);
    if (manualSwaps.length) parts.push(`${manualSwaps.length} via temp`);
    notes.push(`✓ Swap count (${totalSwapCount}) ≤ N-1 (${n-1}) [${parts.join(', ')}]`);
    if (totalSwapCount === n - 1) { score += 0.05; notes.push('✓ Exactly N-1 swaps (classic selection sort)'); }
  } else {
    notes.push(`✗ Swap count (${totalSwapCount}) > N-1 (${n-1})`);
    score += 0.1;
  }

  // Non-adjacent swaps (expected for selection sort when swapping with the minimum)
  const allSwapPairs = [
    ...directSwaps.map(a => ({ fromIdx: a.meta.fromIdx, toIdx: a.meta.toIdx })),
    ...manualSwaps,
  ];
  const nonAdj = allSwapPairs.filter(s => Math.abs(s.fromIdx - s.toIdx) > 1);
  if (nonAdj.length > 0) {
    score += 0.15;
    notes.push(`✓ ${nonAdj.length} non-adjacent swap(s) (swapping with minimum element)`);
  }

  // Verify each swap progressively settles a front element
  const sorted = [...initial].map(cardNum).sort((a, b) => a - b);
  const swapSnaps = [
    ...directSwaps.map(a => a.snap),
    ...manualSwaps.map(s => actions[s.actionIndices[2]].snap),
  ];
  let settledSwaps = 0;
  for (let i = 0; i < swapSnaps.length; i++) {
    const arr = swapSnaps[i].array;
    // Left-to-right: min-selection variant — front k elements match sorted
    let kL = 0;
    while (kL < arr.length && !isGhost(arr[kL]) && cardNum(arr[kL]) === sorted[kL]) kL++;
    // Right-to-left: max-selection variant — back k elements match sorted
    let kR = arr.length - 1;
    while (kR >= 0 && !isGhost(arr[kR]) && cardNum(arr[kR]) === sorted[kR]) kR--;
    const settledFromRight = arr.length - 1 - kR;
    if (kL >= i + 1 || settledFromRight >= i + 1) settledSwaps++;
  }
  if (settledSwaps === swapSnaps.length) {
    score += 0.1;
    notes.push('✓ Each swap progressively settled the next element into its final position');
  }

  const passes = actions.filter(a => a.type === 'pass');
  if (passes.length > 0) { score += 0.05; notes.push(`✓ ${passes.length} pass marker(s) annotated`); }

  return { score: Math.max(0, Math.min(1, score)), notes };
}

function scoreCounting(actions, n) {
  const real  = actions.filter(a => a.type !== 'pass');
  const notes = [];

  if (real.length === 0) return { score: 0, notes: ['No moves recorded'] };

  // Primary signal: type:'count' actions — drag array[i]=V to scratch[V] to tally
  const countActions = real.filter(a => a.type === 'count');
  // Legacy signal: type:'move' to scratch where value matches slot index (pre-M10 model)
  const legacyToScratch = real.filter(a => a.type !== 'count' && a.meta && a.meta.toZone === 'scratch');

  let score = 0;

  if (countActions.length > 0) {
    // New counter model: every count action is by definition correct (wrong-slot drops are rejected)
    score += 0.65;
    notes.push(`✓ ${countActions.length} tally actions recorded (count phase)`);

    // Output phase: type:'move' from scratch in ascending index order
    const outputActions = real.filter(a => a.type === 'move' && a.meta && a.meta.fromZone === 'scratch');
    if (outputActions.length > 0) {
      const indices = outputActions.map(a => a.meta.fromIdx);
      const ascending = indices.every((v, i) => i === 0 || v >= indices[i - 1]);
      if (ascending) {
        score += 0.30;
        notes.push('✓ Output phase reads scratch slots in ascending index order');
      } else {
        score += 0.10;
        notes.push('Output not in ascending scratch order');
      }
    } else {
      notes.push('Output phase not yet started');
      score += 0.05;
    }
  } else if (legacyToScratch.length > 0) {
    // Pre-M10 fallback: check value-matches-index heuristic
    let matchCount = 0;
    for (const action of legacyToScratch) {
      const idx = action.meta.toIdx;
      const raw = action.snap.scratch[idx];
      const val = cardNum(raw);
      if (val !== null && (val === idx + 1 || val === idx)) matchCount++;
    }
    const matchRatio = matchCount / legacyToScratch.length;
    if (matchRatio >= 0.8) {
      score += 0.7;
      notes.push(`✓ ${matchCount}/${legacyToScratch.length} values placed in matching scratch slot`);
    } else {
      notes.push(`✗ Only ${matchCount}/${legacyToScratch.length} values in matching slot`);
      return { score: 0.05, notes };
    }
    const fromScratch = real.filter(a => a.meta && a.meta.fromZone === 'scratch');
    if (fromScratch.length > 0) {
      const indices = fromScratch.map(a => a.meta.fromIdx);
      if (indices.every((v, i) => i === 0 || v >= indices[i - 1])) {
        score += 0.2;
        notes.push('✓ Values read back from scratch in ascending order');
      }
    }
  } else {
    return { score: 0, notes: ['✗ No counting or scratch-write actions found'] };
  }

  return { score: Math.min(1, score), notes };
}

function scoreMerge(actions, n) {
  const real  = actions.filter(a => a.type !== 'pass');
  const notes = [];

  if (real.length === 0) return { score: 0, notes: ['No moves recorded'] };

  const scratchActs = real.filter(a => a.meta && (a.meta.toZone === 'scratch' || a.meta.fromZone === 'scratch'));
  if (scratchActs.length === 0) return { score: 0, notes: ['✗ No scratch area used — merge sort requires auxiliary storage'] };

  let score = 0;
  const scratchRatio = scratchActs.length / real.length;
  score += Math.min(0.45, scratchRatio * 0.6);
  notes.push(`${scratchActs.length} scratch-area actions (${Math.round(scratchRatio*100)}% of total moves)`);

  const writes = scratchActs.filter(a => a.meta.toZone   === 'scratch');
  const reads  = scratchActs.filter(a => a.meta.fromZone === 'scratch');
  if (writes.length > 0 && reads.length > 0) {
    score += 0.35;
    notes.push(`✓ Split phase: ${writes.length} write(s) to scratch; merge phase: ${reads.length} read(s) back`);
  } else if (writes.length > 0) {
    notes.push(`Only writes to scratch — no merge readout detected yet`);
  }

  const lastSnap = real.slice(-1)[0]?.snap;
  if (lastSnap) {
    const expectedCopies = Math.round(2 * n * Math.log2(Math.max(2, n)));
    const ratio = lastSnap.copies / expectedCopies;
    if (ratio >= 0.4 && ratio <= 3) {
      score += 0.1;
      notes.push(`✓ Copy count (${lastSnap.copies}) consistent with O(n log n) operations`);
    }
  }

  const shifts = actions.filter(a => a.type === 'shift');
  if (shifts.length > 0) score -= 0.1;

  return { score: Math.max(0, Math.min(1, score)), notes };
}

function scoreQuick(actions, n) {
  const real   = actions.filter(a => a.type !== 'pass');
  const swaps  = actions.filter(a => a.type === 'swap');
  const shifts = actions.filter(a => a.type === 'shift');
  const notes  = [];

  if (real.length === 0) return { score: 0, notes: ['No moves recorded'] };
  if (shifts.length > 0) return { score: 0.05, notes: ['✗ Shift actions present — not quick sort'] };

  const scratchUsed = real.some(a => a.meta && (a.meta.toZone === 'scratch' || a.meta.fromZone === 'scratch'));
  if (scratchUsed) return { score: 0.05, notes: ['✗ Scratch used — quick sort is in-place'] };

  if (swaps.length === 0) return { score: 0.05, notes: ['✗ No swaps recorded'] };

  const nonAdj = swaps.filter(a =>
    !(a.meta.fromZone === 'array' && a.meta.toZone === 'array' && Math.abs(a.meta.fromIdx - a.meta.toIdx) === 1)
  );

  if (nonAdj.length === 0) return { score: 0.1, notes: ['All swaps adjacent — looks more like bubble sort'] };

  let score = 0.3;
  notes.push(`✓ ${nonAdj.length} non-adjacent swap(s) (partitioning around pivot)`);

  if (swaps.length > n - 1) {
    score += 0.15;
    notes.push(`Swap count (${swaps.length}) above selection sort threshold`);
  }

  notes.push('(Quick sort is difficult to distinguish definitively from action patterns alone)');

  return { score: Math.max(0, Math.min(0.6, score)), notes };
}

function scoreRadix(actions, n) {
  const real   = actions.filter(a => a.type !== 'pass');
  const passes = actions.filter(a => a.type === 'pass');
  const notes  = [];

  if (real.length === 0) return { score: 0, notes: ['No moves recorded'] };

  const scratchActs = real.filter(a => a.meta && (a.meta.toZone === 'scratch' || a.meta.fromZone === 'scratch'));
  if (scratchActs.length === 0) return { score: 0, notes: ['✗ No scratch area used'] };

  notes.push('(Radix sort is hard to distinguish from counting sort for small N)');
  let score = 0.08;
  if (passes.length >= 2) { score += 0.15; notes.push(`${passes.length} pass markers (multi-pass is a radix sort signal)`); }

  return { score: Math.max(0, Math.min(0.35, score)), notes };
}

// Fraction of array elements already in their correct sorted position (0 = all wrong, 1 = all correct).
function sortedFraction(arr) {
  const vals = arr.map(c => cardNum(c)).filter(v => v !== null);
  if (vals.length === 0) return 1;
  const sorted = [...vals].sort((a, b) => a - b);
  const correct = vals.filter((v, i) => v === sorted[i]).length;
  return correct / vals.length;
}

function analyzeSession() {
  const actions = state.actions;
  const initial = state.initial;
  const n       = state.n;

  if (actions.length === 0) return null;

  // --- correctness factor: how sorted is the final array? ---
  const finalSnap = actions[actions.length - 1].snap.array;
  const correctnessFactor = sortedFraction(finalSnap.map(migrateCard));

  // --- effort factor: did the student do enough work given initial disorder? ---
  const initialDisplacedCount = n - sortedFraction(initial.map(migrateCard)) * n;
  const moveCount = actions.filter(a => a.type !== 'pass').length;
  const effortFactor = initialDisplacedCount < 1
    ? (moveCount === 0 ? 0 : 1)                                  // already sorted — any moves = full credit
    : Math.min(1, moveCount / (initialDisplacedCount * 0.8));    // scale effort vs work needed

  const penalty = correctnessFactor * effortFactor;

  const scores = {
    bubble:    scoreBubble(actions, n),
    insertion: scoreInsertion(actions, n),
    selection: scoreSelection(actions, initial, n),
    counting:  scoreCounting(actions, n),
    merge:     scoreMerge(actions, n),
    quick:     scoreQuick(actions, n),
    radix:     scoreRadix(actions, n),
  };

  // Apply penalty to all raw scores
  for (const key of Object.keys(scores)) {
    scores[key] = { ...scores[key], score: scores[key].score * penalty };
  }

  const ranked = Object.entries(scores).sort((a, b) => b[1].score - a[1].score);
  const [bestKey, bestData] = ranked[0];
  return { scores, ranked, best: bestKey, confidence: bestData.score, correctnessFactor, effortFactor };
}

// Returns true (stable), false (unstable), or null (cannot measure).
// finalArray must be fully sorted cards with tags to get a meaningful result.
function measureActualStability(finalArray, initialArray) {
  if (!finalArray || !initialArray) return null;
  // Need all slots filled with real, tagged cards
  if (!finalArray.every(v => isCard(v) && v.tag)) return null;
  // Verify sorted order
  const nums = finalArray.map(c => c.v);
  if (!nums.every((v, i) => i === 0 || v >= nums[i - 1])) return null; // not sorted
  // Build expected tag order per value from initialArray
  const initSeq = {};
  for (const card of initialArray) {
    if (!isCard(card) || !card.tag) return null; // initial must also have tags
    (initSeq[card.v] = initSeq[card.v] || []).push(card.tag);
  }
  // Check final tag order matches initial per value
  const finalSeq = {};
  for (const card of finalArray) {
    (finalSeq[card.v] = finalSeq[card.v] || []).push(card.tag);
  }
  for (const v of Object.keys(initSeq)) {
    const a = initSeq[v], b = finalSeq[v] || [];
    if (a.length !== b.length) return null;
    if (!a.every((t, i) => t === b[i])) return false;
  }
  return true;
}

const ALGO_STABLE = {
  bubble:    true,   // never swaps equal neighbours
  insertion: true,   // shifts right, inserts left — equal elements keep order
  selection: false,  // long-range swap can skip over an equal element
  merge:     true,   // merge preserves left-before-right among equals
  quick:     false,  // partition can move equal elements arbitrarily
  counting:  true,   // read out in original relative order (when done correctly)
  radix:     true,   // inherits stability of counting sort pass
};

const ALGO_COLORS = {
  bubble:    '#5b8fff',
  insertion: '#f0a030',
  selection: '#50c878',
  counting:  '#c070f0',
  merge:     '#40c0e0',
  quick:     '#ff6b6b',
  radix:     '#a0e040',
};

function renderAnalysis() {
  const section = document.getElementById('analysis-section');
  const content = document.getElementById('analysis-content');

  const result = analyzeSession();
  if (!result) {
    section.style.display = '';
    content.innerHTML = '<p style="color:var(--muted);font-size:.85rem">No moves to analyze yet.</p>';
    return;
  }

  section.style.display = '';

  const detectedLabel = ALGO_LABELS[result.best];
  const confidence    = Math.round(result.confidence * 100);

  let verdictHtml;
  if (!state.algorithm) {
    verdictHtml = `<div class="analysis-verdict undeclared">Detected: <strong>${detectedLabel}</strong> — ${confidence}% confidence &nbsp;·&nbsp; No algorithm was declared</div>`;
  } else if (state.algorithm === result.best) {
    verdictHtml = `<div class="analysis-verdict match">✓ Declared <strong>${ALGO_LABELS[state.algorithm]}</strong> — matches detected algorithm (${confidence}% confidence)</div>`;
  } else {
    verdictHtml = `<div class="analysis-verdict mismatch">✗ Declared <strong>${ALGO_LABELS[state.algorithm]}</strong> but actions suggest <strong>${detectedLabel}</strong> (${confidence}% confidence)</div>`;
  }

  // Stability — inherent property of detected algorithm
  const detectedStable = ALGO_STABLE[result.best];
  const declaredStable = state.algorithm ? ALGO_STABLE[state.algorithm] : null;
  const stabilityMismatch = state.algorithm && state.algorithm !== result.best &&
                            declaredStable !== detectedStable;
  let inherentNote = '';
  if (stabilityMismatch) {
    inherentNote = ` <span style="color:#f0a030;font-size:.8rem">(declared ${ALGO_LABELS[state.algorithm]} is ${declaredStable ? 'stable' : 'unstable'} — conflicts with detected)</span>`;
  }
  const inherentColor = detectedStable ? '#4caf50' : '#f0a030';

  // Stability — empirical measurement from final array state
  const finalSnap = state.actions.length > 0
    ? state.actions[state.actions.length - 1].snap.array
    : state.array;
  const empirical = measureActualStability(finalSnap, state.initial);
  let empiricalHtml;
  if (empirical === null) {
    const reason = !state.hasDuplicates
      ? 'add duplicates to measure empirically'
      : 'sort must be complete with all tags present';
    empiricalHtml = `<span style="color:var(--muted)">— <em style="font-size:.8rem">${reason}</em></span>`;
  } else if (empirical) {
    empiricalHtml = `<span style="color:#4caf50;font-weight:bold">✓ Stable</span> <span style="color:var(--muted)">— equal elements preserved their original relative order</span>`;
  } else {
    empiricalHtml = `<span style="color:#e94560;font-weight:bold">✗ Unstable</span> <span style="color:var(--muted)">— equal elements did not preserve their original relative order</span>`;
  }

  const stabilityHtml = `<div style="font-size:.84rem;margin-bottom:14px;padding:8px 14px;border-radius:var(--radius);background:rgba(255,255,255,.04);display:flex;flex-direction:column;gap:6px">
    <div style="display:flex;gap:8px;align-items:baseline;flex-wrap:wrap">
      <span style="color:var(--muted);white-space:nowrap;width:130px">Inherent stability:</span>
      <span style="color:${inherentColor};font-weight:bold">${detectedStable ? '✓ Stable' : '✗ Unstable'}</span>
      <span style="color:var(--muted)">— ${detectedStable ? 'equal elements preserve order' : 'equal elements may not preserve order'} (${ALGO_LABELS[result.best]})${inherentNote}</span>
    </div>
    <div style="display:flex;gap:8px;align-items:baseline;flex-wrap:wrap">
      <span style="color:var(--muted);white-space:nowrap;width:130px">Your sort:</span>
      ${empiricalHtml}
    </div>
  </div>`;

  let barsHtml = '<div class="algo-bars">';
  for (const [key, data] of result.ranked) {
    const pct   = Math.round(data.score * 100);
    const isTop = key === result.best;
    const color = isTop ? ALGO_COLORS[key] : 'rgba(255,255,255,.18)';
    barsHtml += `
      <div class="algo-bar-row">
        <div class="algo-bar-label${isTop ? ' top' : ''}">${ALGO_LABELS[key]}</div>
        <div class="algo-bar-track">
          <div class="algo-bar-fill" style="width:${pct}%;background:${color}"></div>
        </div>
        <div class="algo-bar-pct${isTop ? ' top' : ''}">${pct}%</div>
      </div>`;
  }
  barsHtml += '</div>';

  const topNotes = result.ranked[0][1].notes;
  const topScore = result.ranked[0][1].score;
  const hasPasses = state.actions.some(a => a.type === 'pass');

  // Penalty factor notes
  const penaltyNotes = [];
  const cf = result.correctnessFactor, ef = result.effortFactor;
  if (cf < 0.99) {
    const pct = Math.round(cf * 100);
    penaltyNotes.push(`<li class="bad">⚠ Array is only ${pct}% sorted — confidence discounted accordingly</li>`);
  }
  if (ef < 0.99) {
    if (ef < 0.15) {
      penaltyNotes.push(`<li class="bad">⚠ Array was already mostly sorted and very few moves were made — not enough evidence to classify</li>`);
    } else {
      penaltyNotes.push(`<li class="note">⚠ Fewer moves than expected for the initial disorder — confidence discounted</li>`);
    }
  }

  // Universal hint: if score < 100% and no passes were marked, remind the student
  const passHint = (!hasPasses && topScore < 1.0 && cf > 0.99 && ef > 0.5)
    ? `<li class="note">💡 Did you forget to mark passes? (⚑ Mark Pass after each pass)</li>`
    : '';

  let signalsHtml = '';
  if (topNotes.length > 0 || passHint || penaltyNotes.length > 0) {
    const items = topNotes.map(n => {
      const cls = n.startsWith('✓') ? 'good' : n.startsWith('✗') ? 'bad' : 'note';
      return `<li class="${cls}">${n}</li>`;
    }).join('');
    signalsHtml = `<div class="analysis-signals"><h4>Key signals — ${detectedLabel}</h4><ul>${penaltyNotes.join('')}${items}${passHint}</ul></div>`;
  }

  content.innerHTML = verdictHtml + stabilityHtml + barsHtml + signalsHtml;
}

// ═══════════════════════════════════════════════════════
//  Boot
// ═══════════════════════════════════════════════════════
init();
</script>
